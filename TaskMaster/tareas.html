<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Tareas - TaskMaster</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body class="bg-dark text-light">

    <!-- NAVBAR -->
    <header>
        <nav class="navbar navbar-expand-lg shadow">
            <div class="container">
                <a class="navbar-brand fw-bold" href="index.html">TaskMaster</a>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
                        <li class="nav-item"><a class="nav-link active" href="tareas.html">Tareas</a></li>
                        <li class="nav-item"><a class="nav-link" href="nueva-tarea.html">Nueva Tarea</a></li>
                        <li class="nav-item"><a class="nav-link" href="estadisticas.html">Estadísticas</a></li>
                        <li class="nav-item"><a class="nav-link" href="configuracion.html">Configuración</a></li>
                        <li class="nav-item"><a class="nav-link" href="acerca.html">Acerca de</a></li>
                    </ul>

                    <button id="toggleTema" class="btn btn-outline-light ms-3">🌙</button>
                </div>
            </div>
        </nav>
    </header>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="container py-5">

        <section class="mb-4 text-center">
            <h1 class="fw-bold">Lista de Tareas</h1>
            <p class="lead">Aquí puedes ver, filtrar y gestionar todas tus tareas.</p>
        </section>

        <div class="text-end mb-4">
            <a href="nueva-tarea.html" class="btn btn-warning fw-bold">➕ Nueva Tarea</a>
        </div>

        <!-- FILTROS + BUSCADOR + ORDENAMIENTO -->
        <section class="row g-3 mb-4">

            <!-- FILTRO POR ESTADO -->
            <div class="col-md-3">
                <select id="filtroEstado" class="form-select bg-secondary text-light">
                    <option value="">Filtrar por estado</option>
                    <option value="pendiente">Pendiente</option>
                    <option value="progreso">En progreso</option>
                    <option value="completada">Completada</option>
                </select>
            </div>

            <!-- FILTRO POR PRIORIDAD -->
            <div class="col-md-3">
                <select id="filtroPrioridad" class="form-select bg-secondary text-light">
                    <option value="">Filtrar por prioridad</option>
                    <option value="alta">Alta</option>
                    <option value="media">Media</option>
                    <option value="baja">Baja</option>
                </select>
            </div>

            <!-- BUSCADOR -->
            <div class="col-md-3">
                <input type="text" id="buscarTarea" class="form-control bg-secondary text-light" placeholder="Buscar tarea por nombre...">
            </div>

            <!-- FILTRO POR ETIQUETAS -->
            <div class="col-md-3">
                <input type="text" id="filtroEtiquetas" class="form-control bg-secondary text-light" placeholder="Filtrar por etiqueta...">
            </div>

            <!-- ORDENAR -->
            <div class="col-md-3">
                <select id="ordenarTareas" class="form-select bg-secondary text-light">
                    <option value="">Ordenar por...</option>
                    <option value="fechaAsc">Fecha (más antigua primero)</option>
                    <option value="fechaDesc">Fecha (más reciente primero)</option>
                    <option value="prioridadAlta">Prioridad (alta → baja)</option>
                    <option value="prioridadBaja">Prioridad (baja → alta)</option>
                    <option value="estado">Estado (pendiente → progreso → completada)</option>
                </select>
            </div>

        </section>

        <!-- LISTA DE TAREAS -->
        <section id="listaTareas" class="row g-4">
            <!-- Aquí se agregarán las tareas con JavaScript -->
        </section>

    </main>

    <!-- FOOTER -->
    <footer class="bg-black text-center text-secondary py-3 mt-5">
        <small>TaskMaster © 2026 - Proyecto Web Integrador</small>
    </footer>

    <!-- SCRIPTS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <script src="assets/js/tareas.js"></script>
    <script src="assets/js/storage.js"></script>
    <script src="assets/js/app.js"></script>

</body>
</html>
