<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estadística - TaskMaster</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="assets/css/style.css">
    
    
     <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-dark text-light">

    <header>
    <nav class="navbar navbar-expand-lg shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">TaskMaster</a>
            <button id="toggleTema" class="btn btn-outline-light ms-3">🌙</button>
        </div>
    </nav>
</header>


<main class="container py-5">

    <section class="mb-4 text-center">
        <h1 class="fw-bold">Estadísticas</h1>
        <p class="lead">Resumen visual del estado de tus tareas.</p>
    </section>

    <section class="row g-4">

        <div class="col-md-4">
            <div class="card bg-secondary text-light p-3 shadow">
                <h4 class="fw-bold">Pendientes</h4>
                <p id="statPendientes" class="display-6 fw-bold text-warning">0</p>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card bg-secondary text-light p-3 shadow">
                <h4 class="fw-bold">En progreso</h4>
                <p id="statProgreso" class="display-6 fw-bold text-info">0</p>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card bg-secondary text-light p-3 shadow">
                <h4 class="fw-bold">Completadas</h4>
                <p id="statCompletadas" class="display-6 fw-bold text-success">0</p>
            </div>
        </div>

    </section>

    <section class="mt-5">
        <canvas id="graficoTareas" height="120"></canvas>
    </section>

</main>

<footer class="bg-black text-center text-secondary py-3 mt-5">
    <small>TaskMaster &copy; 2026 - Proyecto Web Integrador</small>
</footer>

<script src="assets/js/tareas.js"></script>
<script src="assets/js/storage.js"></script>
<script src="assets/js/app.js"></script>

    
    
</body>
</html>
