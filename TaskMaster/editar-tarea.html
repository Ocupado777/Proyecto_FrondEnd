<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Tarea - TaskMaster</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="assets/css/style.css">


</head>
<body class="bg-dark text-light">

    <header>
    <nav class="navbar navbar-expand-lg shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">TaskMaster</a>
            <button id="toggleTema" class="btn btn-outline-light ms-3">🌙</button>
        </div>
    </nav>
</header>


<main class="container py-5">

    <section class="mb-4 text-center">
        <h1 class="fw-bold">Editar Tarea</h1>
        <p class="lead">Modifica los datos de la tarea seleccionada.</p>
    </section>

    <section>
        <form id="formEditarTarea" novalidate>

            <div class="mb-3">
                <label for="nombre" class="form-label">Nombre de la tarea</label>
                <input type="text" id="nombre" class="form-control bg-dark text-light" required minlength="3">
            </div>

            <div class="mb-3">
                <label for="descripcion" class="form-label">Descripción</label>
                <textarea id="descripcion" class="form-control bg-dark text-light" rows="3" required></textarea>
            </div>

            <div class="mb-3">
                <label for="prioridad" class="form-label">Prioridad</label>
                <select id="prioridad" class="form-select bg-dark text-light" required>
                    <option value="alta">Alta</option>
                    <option value="media">Media</option>
                    <option value="baja">Baja</option>
                </select>
            </div>

            <div class="mb-3">
                <label for="estado" class="form-label">Estado</label>
                <select id="estado" class="form-select bg-dark text-light" required>
                    <option value="pendiente">Pendiente</option>
                    <option value="progreso">En progreso</option>
                    <option value="completada">Completada</option>
                </select>
            </div>

            <div class="mb-3">
                <label for="fecha" class="form-label">Fecha límite</label>
                <input type="date" id="fecha" class="form-control bg-dark text-light" required>
            </div>

            <div class="mb-3">
    <label class="form-label fw-bold">Etiquetas (separadas por coma)</label>
    <input type="text" id="etiquetas" class="form-control bg-secondary text-light">
</div>

<div class="mb-3">
    <label class="form-label fw-bold">Subtareas</label>

    <div id="listaSubtareasEditar"></div>

    <div class="input-group mt-2">
        <input type="text" id="nuevaSubtareaEditar" class="form-control bg-secondary text-light" placeholder="Agregar subtarea...">
        <button type="button" id="btnAgregarSubtareaEditar" class="btn btn-warning">Agregar</button>
    </div>
</div>


            <div class="text-end">
                <button type="submit" class="btn btn-warning fw-bold">Guardar Cambios</button>
            </div>

        </form>
    </section>

</main>

<footer class="bg-black text-center text-secondary py-3 mt-5">
    <small>TaskMaster &copy; 2026 - Proyecto Web Integrador</small>
</footer>

<script src="assets/js/tareas.js"></script>
<script src="assets/js/storage.js"></script>
<script src="assets/js/app.js"></script>
    
</body>
</html>
