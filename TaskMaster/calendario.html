<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario - TaskMaster</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="icon" type="image/png" href="assets/img/logo.png">

</head>

<body class="bg-dark text-light">

    <!-- NAVBAR -->
    <header>
        <nav class="navbar navbar-expand-lg shadow">
            <div class="container">
                <a class="navbar-brand fw-bold d-flex align-items-center" href="index.html"><img src="assets/img/logo.png" alt="TaskMaster Logo" width="36" height="36" class="me-2">TaskMaster
            
            </a>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
                        <li class="nav-item"><a class="nav-link" href="tareas.html">Tareas</a></li>
                        <li class="nav-item"><a class="nav-link" href="nueva-tarea.html">Nueva Tarea</a></li>
                        <li class="nav-item"><a class="nav-link" href="estadisticas.html">Estadísticas</a></li>
                        <li class="nav-item"><a class="nav-link" href="configuracion.html">Configuración</a></li>
                        <li class="nav-item"><a class="nav-link" href="acerca.html">Acerca de</a></li>
                        <li class="nav-item"><a class="nav-link" href="calendario.html">Calendario</a></li>
                    </ul>

                    <button id="toggleTema" class="btn btn-outline-light ms-3">🌙</button>
                </div>
            </div>
        </nav>
    </header>

    <!-- CONTENIDO -->
    <main class="container py-5">

        <section class="text-center mb-4">
            <h1 class="fw-bold">Calendario</h1>             
        </section>

        <!-- CONTROLES -->
        <div class="d-flex justify-content-between align-items-center mb-4">

    <div class="d-flex gap-2">
        <button id="prevMes" class="btn btn-outline-light">⬅</button>

        <select id="selectMes" class="form-select bg-dark text-light" style="width: 150px;">
            <option value="0">Enero</option>
            <option value="1">Febrero</option>
            <option value="2">Marzo</option>
            <option value="3">Abril</option>
            <option value="4">Mayo</option>
            <option value="5">Junio</option>
            <option value="6">Julio</option>
            <option value="7">Agosto</option>
            <option value="8">Septiembre</option>
            <option value="9">Octubre</option>
            <option value="10">Noviembre</option>
            <option value="11">Diciembre</option>
        </select>

        <select id="selectAnio" class="form-select bg-dark text-light" style="width: 120px;">
        </select>

        <button id="nextMes" class="btn btn-outline-light">➡</button>
    </div>

    <h3 id="tituloMes" class="fw-bold"></h3>
</div>


        <!-- CALENDARIO -->
        <div id="calendario" class="calendar-grid"></div>

        <!-- MODAL PARA VER TAREAS DEL DÍA -->
        <div class="modal fade" id="modalDia" tabindex="-1">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content bg-secondary text-light">
                    <div class="modal-header">
                        <h5 class="modal-title fw-bold" id="modalDiaTitulo"></h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body" id="modalDiaContenido"></div>
                </div>
            </div>
        </div>

    </main>

    <!-- TOASTS -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastContainer"></div>

    <!-- FOOTER -->
    <footer class="bg-black text-center text-secondary py-3 mt-5">
        <small>TaskMaster © 2026 - Proyecto Web Integrador</small>
    </footer>

    <!-- SCRIPTS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <script src="assets/js/storage.js"></script>
    <script src="assets/js/app.js"></script>
    <script src="assets/js/calendar.js"></script>

</body>
</html>
